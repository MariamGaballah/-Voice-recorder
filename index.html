<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recorder Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-microphone-alt"></i>
                    Voice Recorder Pro
                </h1>
                <div class="user-info">
                    <span id="userName">المستخدم الضيف</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Recorder Section -->
        <section class="recorder-section">
            <div class="recorder-card">
                <div class="recorder-header">
                    <h2><i class="fas fa-microphone"></i> مسجل الصوت</h2>
                    <div class="recording-indicator" id="recordingIndicator">
                        <span></span>
                    </div>
                </div>
                
                <div class="recorder-controls">
                    <div class="time-display">
                        <span id="currentTime">00:00</span>
                        <span>/</span>
                        <span id="maxTime">--:--</span>
                    </div>
                    
                    <div class="control-buttons">
                        <button id="recordBtn" class="btn-record">
                            <i class="fas fa-microphone"></i>
                            <span>ابدأ التسجيل</span>
                        </button>
                        <button id="stopBtn" class="btn-stop" disabled>
                            <i class="fas fa-stop"></i>
                        </button>
                        <button id="playBtn" class="btn-play" disabled>
                            <i class="fas fa-play"></i>
                        </button>
                        <button id="downloadBtn" class="btn-download" disabled>
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>

                <div class="waveform-container">
                    <canvas id="waveform" width="600" height="100"></canvas>
                </div>
            </div>
        </section>

        <!-- Recordings List -->
        <section class="recordings-section">
            <div class="section-header">
                <h2><i class="fas fa-list"></i> التسجيلات</h2>
                <button id="newRecordingBtn" class="btn-primary">
                    <i class="fas fa-plus"></i> تسجيل جديد
                </button>
            </div>
            
            <div class="recordings-grid" id="recordingsGrid">
                <!-- Recordings will be loaded here -->
            </div>
        </section>
    </div>

    <!-- Modal for recording details -->
    <div id="recordingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>تفاصيل التسجيل</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <audio id="modalAudio" controls></audio>
                <div class="modal-actions">
                    <button id="saveRecordingBtn" class="btn-success">
                        <i class="fas fa-save"></i> حفظ
                    </button>
                    <button id="deleteRecordingBtn" class="btn-danger">
                        <i class="fas fa-trash"></i> حذف
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Local Storage Notice -->
    <div id="storageNotice" class="storage-notice">
        <i class="fas fa-info-circle"></i>
        التسجيلات محفوظة محليًا في المتصفح
    </div>

    <script src="script.js"></script>
</body>
</html>
