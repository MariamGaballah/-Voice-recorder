<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>استديو الصوت الاحترافي | Pro Audio Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>جاري المعالجة...</p>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-microphone-alt"></i>
                <h2>Pro Studio</h2>
            </div>
            
            <div class="stats-cards">
                <div class="stat-card">
                    <i class="fas fa-microphone"></i>
                    <div class="stat-info">
                        <span class="stat-value" id="totalRecordings">0</span>
                        <span class="stat-label">تسجيلات</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <div class="stat-info">
                        <span class="stat-value" id="totalTime">00:00:00</span>
                        <span class="stat-label">إجمالي المدة</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-database"></i>
                    <div class="stat-info">
                        <span class="stat-value" id="totalSize">0 MB</span>
                        <span class="stat-label">المساحة المستخدمة</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-menu">
                <button class="menu-item active" data-view="recordings">
                    <i class="fas fa-waveform"></i>
                    <span>تسجيلاتي</span>
                </button>
                <button class="menu-item" data-view="favorites">
                    <i class="fas fa-heart"></i>
                    <span>المفضلة</span>
                </button>
                <button class="menu-item" data-view="trash">
                    <i class="fas fa-trash-alt"></i>
                    <span>سلة المحذوفات</span>
                </button>
                <button class="menu-item" data-view="settings">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </button>
            </div>

            <div class="sidebar-footer">
                <div class="storage-info">
                    <div class="storage-bar">
                        <div class="storage-fill" id="storageFill" style="width: 0%"></div>
                    </div>
                    <span id="storageText">0% مستخدم</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="ابحث في التسجيلات...">
                </div>
                <div class="header-actions">
                    <button id="exportAllBtn" class="icon-btn" title="تصدير الكل">
                        <i class="fas fa-download"></i>
                    </button>
                    <button id="clearAllBtn" class="icon-btn" title="مسح الكل">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </header>

            <!-- Recorder Section -->
            <section class="recorder-section">
                <div class="recorder-card">
                    <div class="visualizer-container">
                        <canvas id="visualizer" class="visualizer"></canvas>
                        <div class="recording-indicator" id="recordingIndicator">
                            <span class="pulse-dot"></span>
                            <span>تسجيل</span>
                        </div>
                    </div>

                    <div class="time-display" id="timeDisplay">
                        00:00:00
                    </div>

                    <div class="recorder-controls">
                        <button id="recordBtn" class="control-btn record-btn">
                            <i class="fas fa-microphone"></i>
                            <span>تسجيل</span>
                        </button>
                        <button id="stopBtn" class="control-btn stop-btn" disabled>
                            <i class="fas fa-stop"></i>
                            <span>إيقاف</span>
                        </button>
                        <button id="playLatestBtn" class="control-btn play-btn" disabled>
                            <i class="fas fa-play"></i>
                            <span>تشغيل</span>
                        </button>
                        <button id="saveBtn" class="control-btn save-btn" disabled>
                            <i class="fas fa-save"></i>
                            <span>حفظ</span>
                        </button>
                    </div>

                    <div class="audio-quality">
                        <span>جودة الصوت:</span>
                        <select id="qualitySelect">
                            <option value="high">عالية (192 كيلوبت)</option>
                            <option value="medium" selected>متوسطة (128 كيلوبت)</option>
                            <option value="low">منخفضة (64 كيلوبت)</option>
                        </select>
                    </div>

                    <div class="status-message" id="statusMessage">
                        <i class="fas fa-info-circle"></i>
                        <span>جاهز للتسجيل</span>
                    </div>
                </div>
            </section>

            <!-- Recordings List Section -->
            <section class="recordings-section">
                <div class="section-header">
                    <h2>
                        <i class="fas fa-list-ul"></i>
                        <span id="sectionTitle">جميع التسجيلات</span>
                    </h2>
                    <div class="sort-controls">
                        <select id="sortSelect">
                            <option value="date-desc">الأحدث أولاً</option>
                            <option value="date-asc">الأقدم أولاً</option>
                            <option value="name-asc">الاسم (أ-ي)</option>
                            <option value="name-desc">الاسم (ي-أ)</option>
                            <option value="duration-asc">المدة (أقصر)</option>
                            <option value="duration-desc">المدة (أطول)</option>
                        </select>
                    </div>
                </div>

                <div id="recordingsContainer" class="recordings-container">
                    <!-- Recordings will be injected here -->
                </div>
            </section>
        </main>

        <!-- Audio Player Modal -->
        <div id="playerModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>تشغيل التسجيل</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="player-waveform">
                        <canvas id="playerWaveform"></canvas>
                    </div>
                    <div class="player-controls">
                        <button id="modalPlayBtn" class="player-btn">
                            <i class="fas fa-play"></i>
                        </button>
                        <div class="player-progress">
                            <input type="range" id="progressSlider" value="0" step="0.01">
                            <div class="time-info">
                                <span id="currentTime">00:00</span>
                                <span id="totalDuration">00:00</span>
                            </div>
                        </div>
                        <button id="modalFavoriteBtn" class="player-btn">
                            <i class="far fa-heart"></i>
                        </button>
                        <button id="modalDownloadBtn" class="player-btn">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
