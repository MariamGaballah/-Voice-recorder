<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسجل الصوت - Voice Recorder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-microphone"></i> مسجل الصوت</h1>
            <p>سجل وأدر فويساتك بسهولة</p>
        </header>

        <main>
            <!-- قسم التسجيل -->
            <section class="recording-section">
                <div class="recorder-controls">
                    <button id="startBtn" class="btn-record">
                        <i class="fas fa-microphone"></i> ابدأ التسجيل
                    </button>
                    <button id="stopBtn" class="btn-stop" disabled>
                        <i class="fas fa-stop"></i> إيقاف
                    </button>
                    <button id="playBtn" class="btn-play" disabled>
                        <i class="fas fa-play"></i> تشغيل
                    </button>
                    <button id="downloadBtn" class="btn-download" disabled>
                        <i class="fas fa-download"></i> تحميل
                    </button>
                </div>
                
                <div class="recording-info">
                    <div class="timer" id="timer">00:00:00</div>
                    <div class="level-meter" id="levelMeter"></div>
                </div>
            </section>

            <!-- قسم التحميل -->
            <section class="upload-section">
                <h3>رفع ملف صوتي</h3>
                <input type="file" id="fileInput" accept="audio/*" class="file-input">
                <button id="uploadBtn" class="btn-upload" disabled>
                    <i class="fas fa-upload"></i> رفع الملف
                </button>
            </section>

            <!-- قائمة التسجيلات -->
            <section class="recordings-list">
                <h3><i class="fas fa-list"></i> التسجيلات</h3>
                <div id="recordingsList" class="recordings-grid">
                    <!-- التسجيلات هتظهر هنا -->
                </div>
            </section>
        </main>

        <!-- Modal للتأكيد -->
        <div id="confirmModal" class="modal">
            <div class="modal-content">
                <h3>تأكيد الحذف</h3>
                <p>هل أنت متأكد من حذف هذا التسجيل؟</p>
                <div class="modal-buttons">
                    <button id="confirmDelete" class="btn-danger">حذف</button>
                    <button id="cancelDelete" class="btn-secondary">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
